<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI Portfolio</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { max-width: 100%; overflow-x: hidden; }
  body {
    background: #0a0a0a;
    color: #e8e8e6;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    min-height: 100vh;
    padding: 80px 48px 100px;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    top: -500px; left: -500px;
    width: 1000px; height: 1000px;
    background: radial-gradient(ellipse at center, rgba(50,70,160,0.22) 0%, rgba(25,35,100,0.1) 45%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    top: -350px; left: -350px;
    width: 600px; height: 600px;
    background: radial-gradient(ellipse at center, rgba(90,50,180,0.12) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .hero { max-width: 900px; margin-bottom: 80px; position: relative; z-index: 1; }
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 24px 48px;
    display: flex;
    justify-content: flex-end;
    z-index: 10;
    pointer-events: none;
  }
  .topbar-link {
    pointer-events: auto;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid #2a2a28;
    display: flex; align-items: center; justify-content: center;
    color: #6b6b69;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
  }
  .topbar-link:hover { border-color: #555552; color: #e8e8e6; }
  .topbar-link svg { width: 16px; height: 16px; }

  .hero-name {
    font-size: clamp(28px, 4vw, 52px);
    font-weight: 500;
    color: #3a3a38;
    letter-spacing: -0.02em;
    margin-bottom: 24px;
    font-family: 'Courier New', monospace;
  }
  .hero-subtitle {
    font-size: clamp(24px, 3.5vw, 44px);
    font-weight: 600;
    color: #f0ede6;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 20px;
  }
    display: block;
    width: 70%;
    max-width: 630px;
    height: auto;
    margin-bottom: 28px;
    margin-top: -20px;
  }
  .hero-title {
    font-size: clamp(42px, 6vw, 88px);
    font-weight: 600;
    line-height: 1.0;
    letter-spacing: -0.03em;
    margin-bottom: 0;
    position: relative;
    display: inline-block;
  }
  .hero-title-text {
    color: #f0ede6;
  }
  .hero-desc {
    font-size: 18px;
    color: rgba(255,255,255,0.7);
    line-height: 1.7;
    max-width: 440px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  .tile {
    background: #141413;
    border: 1px solid #1e1e1c;
    border-radius: 8px;
    position: relative;
    aspect-ratio: 4 / 3;
    overflow: hidden;
    transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), border 0.5s, box-shadow 0.5s;
  }
  .tile:hover {
    transform: scale(1.035);
    border: 0.3px solid rgba(220,216,208,0.6);
    box-shadow: 0 0 0 0.5px rgba(220,216,208,0.25), 0 0 20px 3px rgba(200,190,165,0.09);
    z-index: 2;
  }

  .tile-rive-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    background: #0f0f0e;
    pointer-events: auto;
    touch-action: none;
  }

  .tile-placeholder-icon {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    pointer-events: none;
  }
  .tile-placeholder-icon svg { opacity: 0.15; }
  .tile-placeholder-icon span { font-size: 10px; color: #2a2a28; letter-spacing: 0.08em; }

  .tile-meta {
    position: absolute;
    inset: 0;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    pointer-events: none;
    opacity: 0.75;
    transition: opacity 0.25s;
  }
  .tile:hover .tile-meta { opacity: 0.3; }

  .tile-date { font-size: 10px; color: #9a9a98; letter-spacing: 0.1em; text-transform: uppercase; }
  .tile-label { font-size: 11px; color: #6b6b69; letter-spacing: 0.04em; }

  @media (hover: none) {
    .tile:hover {
      transform: none;
      border: 1px solid #1e1e1c;
      box-shadow: none;
    }
    .tile:hover .tile-meta { opacity: 0.75; }
  }

  @media (max-width: 800px) {
    body { padding: 48px 20px 80px; }
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 520px) {
    body { padding: 40px 16px 60px; }
    .hero { margin-bottom: 48px; }
    .hero-title { font-size: 13vw; }
    .hero-desc { font-size: 14px; }
    .grid { grid-template-columns: 1fr; gap: 10px; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="title-wrap">
    <img src="header.gif" alt="Interface details" class="hero-gif">
  </div>
  <p class="hero-desc">Hi, I'm Alexey — a motion designer.<br>Here are my notes on exploring Rive<br>and interactive design.<br><br>Telegram: @leha_biceps</p>
</div>

<div class="grid">

  <div class="tile">
    <canvas class="tile-rive-canvas" id="rive-1"></canvas>
    <div class="tile-meta">
      <span class="tile-date">22 Apr 2026</span>
    </div>
  </div>

  <div class="tile">
    <canvas class="tile-rive-canvas" id="rive-2"></canvas>
    <div class="tile-meta">
      <span class="tile-date">20 Apr 2026</span>
    </div>
  </div>

  <div class="tile">
    <canvas class="tile-rive-canvas" id="rive-3"></canvas>
    <div class="tile-meta">
      <span class="tile-date">13 Apr 2026</span>
    </div>
  </div>

</div>

<script>
const RIVE_SRC = 'rive_test_01.riv';

function loadRive(callback) {
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/@rive-app/canvas@2.35.3/rive.js';
  s.onload = callback;
  s.onerror = () => console.warn('Failed to load Rive script');
  document.head.appendChild(s);
}

function initRive(canvasId, src) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  const r = new rive.Rive({
    src,
    canvas,
    autoplay: true,
    stateMachines: 'State Machine 1',
    fit: rive.Fit.Cover,
    alignment: rive.Alignment.Center,
    onLoadError: (e) => console.warn('Rive file error', e),
    onLoad: () => r.resizeDrawingSurfaceToCanvas(),
  });

  window.addEventListener('resize', () => r.resizeDrawingSurfaceToCanvas());

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    canvas.dispatchEvent(new PointerEvent('pointermove', { clientX: t.clientX, clientY: t.clientY, bubbles: true }));
    canvas.dispatchEvent(new PointerEvent('pointerdown', { clientX: t.clientX, clientY: t.clientY, bubbles: true }));
    canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY, bubbles: true }));
    canvas.dispatchEvent(new MouseEvent('mouseenter', { clientX: t.clientX, clientY: t.clientY, bubbles: true }));
    canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY, bubbles: true }));
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    const t = e.changedTouches[0];
    canvas.dispatchEvent(new PointerEvent('pointerup', { clientX: t.clientX, clientY: t.clientY, bubbles: true }));
    canvas.dispatchEvent(new MouseEvent('mouseup', { clientX: t.clientX, clientY: t.clientY, bubbles: true }));
    canvas.dispatchEvent(new MouseEvent('click', { clientX: t.clientX, clientY: t.clientY, bubbles: true }));
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    canvas.dispatchEvent(new PointerEvent('pointermove', { clientX: t.clientX, clientY: t.clientY, bubbles: true }));
    canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY, bubbles: true }));
  }, { passive: false });
}

loadRive(() => {
  initRive('rive-1', 'anim_04.riv');
  initRive('rive-2', 'rive_test_03.riv');
  initRive('rive-3', RIVE_SRC);
});
</script>
</body>
</html>
